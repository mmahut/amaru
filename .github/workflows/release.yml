name: Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: Create a release
        required: true
        type: boolean
        default: false
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/pragma-org/amaru

permissions:
  contents: read
  pages: write
  packages: write
  attestations: write
  id-token: write

jobs:
  build-metadata:
    name: Prepare build metadata
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.meta.outputs.is_release }}
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_patch: ${{ steps.meta.outputs.release_patch }}
      msi_version: ${{ steps.meta.outputs.msi_version }}

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.release && 'true' || 'false' }}
        run: |
          set -euo pipefail

          read_amaru_version() {
            grep -m 1 '^version = "' crates/amaru/Cargo.toml | sed -E 's/^version = "(.*)"$/\1/'
          }

          count_previous_published_releases() {
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq -s 'map(.[]) | map(select(.draft | not) | select(.published_at != null)) | length'
          }

          if [[ "$REQUESTED_RELEASE" == "true" ]]; then
            current_version="$(read_amaru_version)"

            if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "expected amaru version to match <major>.<minor>.<patch>, got: $current_version" >&2
              exit 1
            fi

            release_patch="$(date -u +%Y%m%d)"
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${release_patch}"
            msi_patch="$(count_previous_published_releases)"
            msi_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${msi_patch}.${release_patch}"

            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
            echo "release_patch=$release_patch" >> "$GITHUB_OUTPUT"
            echo "msi_version=$msi_version" >> "$GITHUB_OUTPUT"
          else
            current_version="$(read_amaru_version)"

            if [[ ! "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "expected amaru version to match <major>.<minor>.<patch>, got: $current_version" >&2
              exit 1
            fi

            if [[ "${BASH_REMATCH[3]}" != "0" ]]; then
              echo "nightly builds require crates/amaru/Cargo.toml to use a .0 patch version, got: $current_version" >&2
              exit 1
            fi

            version="nightly-$(git rev-parse --short=8 HEAD)"

            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "release_patch=0" >> "$GITHUB_OUTPUT"
            echo "msi_version=$current_version" >> "$GITHUB_OUTPUT"
          fi

  rust-build:
    name: Build ${{ matrix.environments.title }}
    timeout-minutes: 60
    needs: build-metadata
    strategy:
      matrix:
        environments:
          - title: linux-x86_64
            target: x86_64-unknown-linux-musl
            build: zigbuild
            executable: amaru
            setup: |
              sudo apt-get install -y pkg-config musl musl-dev musl-tools rpm
              if ! cargo deb --version >/dev/null 2>&1; then
                cargo install cargo-deb
              fi
              if ! cargo generate-rpm --version >/dev/null 2>&1; then
                cargo install cargo-generate-rpm
              fi
              sudo snap install zig --classic --beta
              if ! command -v cargo-zigbuild >/dev/null 2>&1; then
                cargo install cargo-zigbuild
              fi
              rustup target add x86_64-unknown-linux-musl
            runner: ubuntu-24.04

          - title: linux-aarch64
            target: aarch64-unknown-linux-musl
            build: zigbuild
            executable: amaru
            setup: |
              sudo apt-get install -y pkg-config musl musl-dev musl-tools rpm
              if ! cargo deb --version >/dev/null 2>&1; then
                cargo install cargo-deb
              fi
              if ! cargo generate-rpm --version >/dev/null 2>&1; then
                cargo install cargo-generate-rpm
              fi

              sudo snap install zig --classic --beta
              if ! command -v cargo-zigbuild >/dev/null 2>&1; then
                cargo install cargo-zigbuild
              fi
              rustup target add aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm

          - title: macos-aarch64
            target: aarch64-apple-darwin
            build: build
            executable: amaru
            runner: macos-15

          - title: windows-x86_64
            target: x86_64-pc-windows-msvc
            build: build
            executable: amaru.exe
            setup: |
              if ! cargo wix --version >/dev/null 2>&1; then
                cargo install cargo-wix
              fi
            runner: windows-latest

    runs-on: ${{ matrix.environments.runner }}

    steps:
      - name: Support longpaths on Windows
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: cargo build
        shell: bash
        env:
          BUILT_OVERRIDE_amaru_PKG_VERSION_PATCH: ${{ needs.build-metadata.outputs.release_patch }}
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.environments.setup }}" ]]; then
            ${{ matrix.environments.setup || 'echo "no setup needed..."' }}
          fi
          cargo ${{ matrix.environments.build }} --release --locked --target ${{ matrix.environments.target }}

      - name: prepare distribution files
        id: pack
        shell: bash
        env:
          OUT: amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}
          BUILT_OVERRIDE_amaru_PKG_VERSION_PATCH: ${{ needs.build-metadata.outputs.release_patch }}
        run: |
          make dist \
            BUILD_PROFILE=release \
            AMARU_BIN='./target/${{ matrix.environments.target }}/release/${{ matrix.environments.executable }}' \
            DIST_DIR="$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Build Debian archive
        if: ${{ startsWith(matrix.environments.title, 'linux-') }}
        shell: bash
        env:
          VERSION: ${{ needs.build-metadata.outputs.version }}
          ARCHIVE_SUFFIX: ${{ matrix.environments.title }}
          BUILT_OVERRIDE_amaru_PKG_VERSION_PATCH: ${{ needs.build-metadata.outputs.release_patch }}
        run: |
          make deb \
            ARCHIVE_ROOT_NAME="amaru-${VERSION}-${ARCHIVE_SUFFIX}" \
            BUILD_PROFILE=release \
            AMARU_BIN='./target/${{ matrix.environments.target }}/release/amaru' \
            PACKAGE_TARGET='${{ matrix.environments.target }}' \
            DIST_DIR='dist'

      - name: Build RPM archive
        if: ${{ startsWith(matrix.environments.title, 'linux-') }}
        shell: bash
        env:
          VERSION: ${{ needs.build-metadata.outputs.version }}
          ARCHIVE_SUFFIX: ${{ matrix.environments.title }}
          BUILT_OVERRIDE_amaru_PKG_VERSION_PATCH: ${{ needs.build-metadata.outputs.release_patch }}
        run: |
          make rpm \
            ARCHIVE_ROOT_NAME="amaru-${VERSION}-${ARCHIVE_SUFFIX}" \
            BUILD_PROFILE=release \
            AMARU_BIN='./target/${{ matrix.environments.target }}/release/amaru' \
            PACKAGE_TARGET='${{ matrix.environments.target }}' \
            DIST_DIR='dist'

      - name: Build Windows MSI installer
        if: ${{ matrix.environments.title == 'windows-x86_64' }}
        shell: bash
        env:
          VERSION: ${{ needs.build-metadata.outputs.version }}
          MSI_VERSION: ${{ needs.build-metadata.outputs.msi_version }}
          BUILT_OVERRIDE_amaru_PKG_VERSION_PATCH: ${{ needs.build-metadata.outputs.release_patch }}
        run: |
          make msi \
            ARCHIVE_ROOT_NAME="amaru-${VERSION}-windows-x86_64" \
            BUILD_PROFILE=release \
            AMARU_BIN='./target/${{ matrix.environments.target }}/release/${{ matrix.environments.executable }}' \
            MSI_VERSION="${MSI_VERSION}" \
            DIST_DIR='dist'

      - uses: actions/upload-artifact@v7
        with:
          name: amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}
          path: ${{ steps.pack.outputs.path }}

      - uses: actions/upload-artifact@v7
        if: ${{ startsWith(matrix.environments.title, 'linux-') }}
        with:
          name: amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}-packages
          path: |
            amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}.deb
            amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}.rpm

      - uses: actions/upload-artifact@v7
        if: ${{ matrix.environments.title == 'windows-x86_64' }}
        with:
          name: amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}-packages
          path: |
            amaru-${{ needs.build-metadata.outputs.version }}-${{ matrix.environments.title }}.msi

  draft-release:
    name: Create draft release
    if: ${{ needs.build-metadata.outputs.is_release == 'true' }}
    needs: [build-metadata, rust-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: amaru-${{ needs.build-metadata.outputs.version }}-*
          path: ./artifacts

      - name: Package release archives
        shell: bash
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
          VERSION: ${{ needs.build-metadata.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for artifact_dir in ./artifacts/*; do
            if find "$artifact_dir" -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.msi' \) | grep -q .; then
              find "$artifact_dir" -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.msi' \) -exec cp {} release-assets/ \;
              continue
            fi

            name="$(basename "$artifact_dir")"
            if [[ "$name" == *windows-* ]]; then
              (
                cd ./artifacts
                zip -qr "../release-assets/${name}.zip" "$name"
              )
            else
              tar -C ./artifacts -czf "release-assets/${name}.tar.gz" "$name"
            fi
          done

          asset_name_for() {
            basename "$1"
          }

          asset_url_for() {
            local asset_name="$1"
            printf 'https://github.com/%s/releases/download/%s/%s\n' "$GITHUB_REPOSITORY" "$RELEASE_TAG" "$asset_name"
          }

          checksum_for() {
            shasum -a 256 "$1" | awk '{print $1}'
          }

          release_row() {
            local artifact_type="$1"
            local extension="$2"
            local download_links="$3"
            printf '| %s | `%s` | %s |\n' \
              "$artifact_type" \
              "$extension" \
              "$download_links"
          }

          asset_link_for() {
            local label="$1"
            local asset_name="$2"
            printf '[%s](%s)' "$label" "$(asset_url_for "$asset_name")"
          }

          linux_tar_x86_64="amaru-${VERSION}-linux-x86_64.tar.gz"
          linux_tar_aarch64="amaru-${VERSION}-linux-aarch64.tar.gz"
          linux_deb_x86_64="amaru-${VERSION}-linux-x86_64.deb"
          linux_deb_aarch64="amaru-${VERSION}-linux-aarch64.deb"
          linux_rpm_x86_64="amaru-${VERSION}-linux-x86_64.rpm"
          linux_rpm_aarch64="amaru-${VERSION}-linux-aarch64.rpm"
          macos_tar_aarch64="amaru-${VERSION}-macos-aarch64.tar.gz"
          windows_zip_x86_64="amaru-${VERSION}-windows-x86_64.zip"
          windows_msi_x86_64="amaru-${VERSION}-windows-x86_64.msi"

          expected_assets=(
            "$linux_tar_x86_64"
            "$linux_tar_aarch64"
            "$linux_deb_x86_64"
            "$linux_deb_aarch64"
            "$linux_rpm_x86_64"
            "$linux_rpm_aarch64"
            "$macos_tar_aarch64"
            "$windows_zip_x86_64"
            "$windows_msi_x86_64"
          )

          checksum_manifest="amaru-${VERSION}-checksums.manifest"
          : > "release-assets/${checksum_manifest}"

          for asset_name in "${expected_assets[@]}"; do
            if [[ ! -f "release-assets/${asset_name}" ]]; then
              echo "missing expected release artifact: ${asset_name}" >&2
              exit 1
            fi
            checksum="$(checksum_for "release-assets/${asset_name}")"
            printf '%s  %s\n' "$checksum" "$asset_name" >> "release-assets/${checksum_manifest}"
          done

          linux_rows=(
            "$(release_row "Pre-compiled executable" ".tar.gz" "$(asset_link_for "aarch64" "$linux_tar_aarch64") \\| $(asset_link_for "x86_64" "$linux_tar_x86_64")")"
            "$(release_row "Debian package" ".deb" "$(asset_link_for "aarch64" "$linux_deb_aarch64") \\| $(asset_link_for "x86_64" "$linux_deb_x86_64")")"
            "$(release_row "RPM package" ".rpm" "$(asset_link_for "aarch64" "$linux_rpm_aarch64") \\| $(asset_link_for "x86_64" "$linux_rpm_x86_64")")"
          )

          macos_rows=(
            "$(release_row "Pre-compiled executable" ".tar.gz" "$(asset_link_for "aarch64" "$macos_tar_aarch64")")"
          )

          windows_rows=(
            "$(release_row "Pre-compiled executable" ".zip" "$(asset_link_for "x86_64" "$windows_zip_x86_64")")"
            "$(release_row "MSI installer" ".msi" "$(asset_link_for "x86_64" "$windows_msi_x86_64")")"
          )

          docker_registry_url="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${DOCKER_IMAGE##*/}"

          {
            printf '## Linux\n\n'
            printf '| Type | File Extension | Download Links |\n'
            printf '| --- | --- | --- |\n'
            printf '%s\n' "${linux_rows[@]}"
            printf '\n## macOS\n\n'
            printf '| Type | File Extension | Download Links |\n'
            printf '| --- | --- | --- |\n'
            printf '%s\n' "${macos_rows[@]}"
            printf '\n## Windows\n\n'
            printf '| Type | File Extension | Download Links |\n'
            printf '| --- | --- | --- |\n'
            printf '%s\n' "${windows_rows[@]}"
            printf '\n## Docker\n\n'
            printf '| Image | Registry |\n'
            printf '| --- | --- |\n'
            printf '| `%s:%s` | [%s](%s) |\n' "$DOCKER_IMAGE" "$RELEASE_TAG" "$docker_registry_url" "$docker_registry_url"
            printf '\n## Checksum manifest\n\n'
            printf '[%s](%s)\n' "$checksum_manifest" "$(asset_url_for "$checksum_manifest")"
          } > release-body.md

          ls -lh release-assets

      - name: Remove stale draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
        run: |
          set -euo pipefail

          release_endpoint="repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          release_json=""

          if release_json="$(gh api "${release_endpoint}" 2>/dev/null)"; then
            if [[ "$(jq -r '.draft' <<< "${release_json}")" != "true" ]]; then
              echo "release ${RELEASE_TAG} already exists and is not a draft; refusing to overwrite it" >&2
              exit 1
            fi

            release_id="$(jq -r '.id' <<< "${release_json}")"
            echo "Deleting stale draft release ${RELEASE_TAG} (id=${release_id})"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Deleting stale tag ${RELEASE_TAG}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          fi

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ needs.build-metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Amaru ${{ needs.build-metadata.outputs.version }}
          body_path: release-body.md
          fail_on_unmatched_files: true
          files: release-assets/*

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release-assets/amaru-${{ needs.build-metadata.outputs.version }}-checksums.manifest

  docker-nightly:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [build-metadata, rust-build]
    uses: ./.github/workflows/docker-publish.yml
    with:
      artifact_source: workflow-artifact
      artifact_version: ${{ needs.build-metadata.outputs.version }}
      checkout_ref: ${{ github.sha }}
      image_name: ghcr.io/pragma-org/amaru
      tag_latest: true
    secrets: inherit

  merge-artifacts:
    name: Merge build artifacts

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: rust-build

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: amaru-*
          path: ./artifacts

      - name: Ensure zip is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

      - name: Prepare combined Github Pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist/downloads

          version=""
          for dir in ./artifacts/*; do
            name="$(basename "$dir")"
            static_name="$(echo "$name" | sed -E 's/amaru-nightly-[0-9a-f]{8,12}-(.*)/\1/')"

            if [[ -z "$version" ]]; then
              version="$(echo "$name" | sed -E 's/amaru-(nightly-[0-9a-f]{8,12})-.*/\1/')"
            fi

            if find "$dir" -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.msi' \) | grep -q .; then
              while IFS= read -r package; do
                package_name="$(basename "$package" | sed -E 's/amaru-nightly-[0-9a-f]{8,12}-(.*)/\1/')"
                cp "$package" "dist/downloads/${package_name}"
              done < <(find "$dir" -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.msi' \) | sort)
              continue
            fi

            if [[ "$static_name" == windows-* ]]; then
              (
                cd ./artifacts
                zip -qr "../dist/downloads/${static_name}.zip" "$name"
              )
            else
              tar -C ./artifacts -czf "dist/downloads/${static_name}.tar.gz" "$name"
            fi
          done

          latest_release_tag=""
          latest_release_url=""
          latest_release_checksums_url=""

          if latest_release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" 2>/dev/null)"; then
            latest_release_tag="$(jq -r '.tag_name // ""' <<< "$latest_release_json")"
            latest_release_url="$(jq -r '.html_url // ""' <<< "$latest_release_json")"
            latest_release_checksums_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${latest_release_tag}/amaru-${latest_release_tag#v}-checksums.manifest"
          fi

          artifact_args=()
          while IFS= read -r artifact; do
            artifact_args+=(--artifact "$artifact")
          done < <(find dist/downloads -maxdepth 1 -type f | sort)

          chmod +x scripts/render-nightly-downloads-page
          ./scripts/render-nightly-downloads-page \
            --version "$version" \
            --latest-release-tag "$latest_release_tag" \
            --latest-release-url "$latest_release_url" \
            --latest-release-checksums-url "$latest_release_checksums_url" \
            "${artifact_args[@]}" \
            --output dist/index.html

      - name: Upload combined artifact for Github Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  publish:
    name: Publish to GitHub Pages
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: merge-artifacts
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
