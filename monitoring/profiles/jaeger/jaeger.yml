receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: traces
  prometheus:
    endpoint: "0.0.0.0:8889"

connectors:
  spanmetrics:

extensions:
  jaeger_query:
    storage:
      traces: traces
      metrics: metrics
  jaeger_storage:
    backends:
      traces:
        memory:
          max_traces: 100000
    metric_backends:
      metrics:
        prometheus:
          endpoint: "http://prometheus:9090"
          normalize_calls: true
          normalize_duration: true

service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter, spanmetrics]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      address: "0.0.0.0:8888"
    logs:
      level: DEBUG
