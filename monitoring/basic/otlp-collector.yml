receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  resource/drop_prometheus_labels:
    attributes:
      - key: service.name
        action: delete
      - key: service.instance.id
        action: delete

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    add_metric_suffixes: false
  debug:
    verbosity: basic
    without_scope_info: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource/drop_prometheus_labels]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      exporters: [debug]
    logs:
      receivers: [otlp]
      exporters: [debug]
